<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Login — EduCloud</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gradient-to-br from-[#1B2A4A] to-[#2B6B8A] min-h-screen flex items-center justify-center p-4">
<div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
<div class="text-center mb-8"><div class="w-20 h-20 bg-[#1B2A4A] rounded-full mx-auto flex items-center justify-center text-white text-3xl font-bold font-serif mb-4">E</div>
<h1 class="text-2xl font-bold text-[#1B2A4A] font-serif">EduCloud</h1><p class="text-gray-500 text-sm mt-1">Cloud-Based E-Learning for Primary Schools</p></div>
{% if form.errors %}<div class="bg-red-50 border border-red-200 text-red-700 rounded-lg p-3 mb-4 text-sm">Invalid username or password.</div>{% endif %}
<form method="post" class="space-y-5">{% csrf_token %}
<div><label class="block text-sm font-semibold text-gray-700 mb-1">Username</label><input type="text" name="username" required autofocus class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-[#2B6B8A] focus:ring-2 focus:ring-[#2B6B8A]/20 outline-none text-lg" placeholder="Enter your username"></div>
<div><label class="block text-sm font-semibold text-gray-700 mb-1">Password</label><input type="password" name="password" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-[#2B6B8A] focus:ring-2 focus:ring-[#2B6B8A]/20 outline-none text-lg" placeholder="Enter your password"></div>
<button type="submit" class="w-full bg-[#1B2A4A] text-white py-3 rounded-lg font-semibold text-lg hover:bg-[#2B6B8A] transition-colors">Sign In</button></form>
<p class="text-center text-gray-400 text-xs mt-6">Redeemer's University &mdash; Running with the Vision</p></div></body></html>
