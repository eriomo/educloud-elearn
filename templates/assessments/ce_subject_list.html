{% extends 'base.html' %}{% block title %}Common Entrance Practice{% endblock %}{% block content %}
<h1 class="text-2xl font-display font-bold text-brand-700 mb-2">Common Entrance Past Questions</h1><p class="text-gray-500 mb-6">Select a subject to start practising</p>
<form method="get" action="{% url 'ce_practice' %}" class="bg-white rounded-xl shadow-sm p-6 max-w-lg space-y-4">
<div><label class="block text-sm font-semibold text-gray-700 mb-1">Subject</label><select name="subject" class="w-full px-3 py-2 border rounded-lg">{% for s in subjects %}<option value="{{ s.name }}">{{ s.name }}</option>{% endfor %}</select></div>
<div><label class="block text-sm font-semibold text-gray-700 mb-1">Year (optional)</label><select name="year" class="w-full px-3 py-2 border rounded-lg"><option value="">All Years</option>{% for y in years %}<option value="{{ y }}">{{ y }}</option>{% endfor %}</select></div>
<div><label class="block text-sm font-semibold text-gray-700 mb-1">Difficulty (optional)</label><select name="difficulty" class="w-full px-3 py-2 border rounded-lg"><option value="">All Levels</option><option value="easy">Easy</option><option value="medium">Medium</option><option value="hard">Hard</option></select></div>
<button type="submit" class="w-full bg-amber-600 text-white py-3 rounded-lg font-bold text-lg hover:bg-amber-700">Start Practice</button></form>{% endblock %}
