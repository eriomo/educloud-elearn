{% extends 'base.html' %}{% block title %}Add CE Question{% endblock %}{% block content %}
<h1 class="text-2xl font-display font-bold text-brand-700 mb-6">Add Common Entrance Question</h1>
<div class="bg-white rounded-xl shadow-sm p-6 max-w-2xl"><form method="post" class="space-y-4">{% csrf_token %}
<div><label class="block text-sm font-semibold text-gray-700 mb-1">Subject</label><select name="subject" class="w-full px-3 py-2 border rounded-lg">{% for s in subjects %}<option value="{{ s.id }}">{{ s }}</option>{% endfor %}</select></div>
<div class="grid grid-cols-2 gap-4"><div><label class="block text-sm font-semibold text-gray-700 mb-1">Exam Year</label><input type="number" name="exam_year" value="2024" min="2000" max="2030" class="w-full px-3 py-2 border rounded-lg"></div>
<div><label class="block text-sm font-semibold text-gray-700 mb-1">Difficulty</label><select name="difficulty_level" class="w-full px-3 py-2 border rounded-lg"><option value="easy">Easy</option><option value="medium" selected>Medium</option><option value="hard">Hard</option></select></div></div>
<div><label class="block text-sm font-semibold text-gray-700 mb-1">Question Text</label><textarea name="question_text" rows="3" required class="w-full px-3 py-2 border rounded-lg"></textarea></div>
<div class="grid grid-cols-2 gap-3"><input name="option_a" placeholder="Option A" required class="px-3 py-2 border rounded-lg"><input name="option_b" placeholder="Option B" required class="px-3 py-2 border rounded-lg"><input name="option_c" placeholder="Option C" required class="px-3 py-2 border rounded-lg"><input name="option_d" placeholder="Option D" required class="px-3 py-2 border rounded-lg"></div>
<div><label class="block text-sm font-semibold text-gray-700 mb-1">Correct Answer</label><select name="correct_option" class="w-full px-3 py-2 border rounded-lg"><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select></div>
<button type="submit" class="bg-green-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-green-700">Add Question</button></form></div>{% endblock %}
