{% extends 'base.html' %}{% block title %}Create Quiz{% endblock %}{% block content %}
<h1 class="text-2xl font-display font-bold text-brand-700 mb-2">Create Quiz</h1><p class="text-gray-500 mb-6">For: {{ lesson.topic_title }}</p>
<div class="bg-white rounded-xl shadow-sm p-6"><form method="post" class="space-y-4" id="quizForm">{% csrf_token %}
<div><label class="block text-sm font-semibold text-gray-700 mb-1">Quiz Title</label><input type="text" name="title" required class="w-full px-3 py-2 border rounded-lg"></div>
<div id="questions"><div class="border rounded-lg p-4 mb-3 bg-gray-50"><h3 class="font-bold text-sm mb-2">Question 1</h3>
<textarea name="q_text_0" placeholder="Question text" required class="w-full px-3 py-2 border rounded-lg mb-2" rows="2"></textarea>
<div class="grid grid-cols-2 gap-2"><input name="q_a_0" placeholder="Option A" required class="px-3 py-2 border rounded-lg text-sm"><input name="q_b_0" placeholder="Option B" required class="px-3 py-2 border rounded-lg text-sm"><input name="q_c_0" placeholder="Option C" required class="px-3 py-2 border rounded-lg text-sm"><input name="q_d_0" placeholder="Option D" required class="px-3 py-2 border rounded-lg text-sm"></div>
<select name="q_correct_0" class="mt-2 px-3 py-2 border rounded-lg text-sm"><option value="A">Correct: A</option><option value="B">Correct: B</option><option value="C">Correct: C</option><option value="D">Correct: D</option></select></div></div>
<button type="button" onclick="addQuestion()" class="text-brand-500 font-semibold text-sm hover:underline">+ Add Another Question</button><br>
<button type="submit" class="bg-brand-500 text-white px-6 py-2 rounded-lg font-semibold hover:bg-brand-600 mt-4">Save Quiz</button></form></div>
{% endblock %}{% block extra_scripts %}<script>let qCount=1;function addQuestion(){const d=document.getElementById('questions');const h=`<div class="border rounded-lg p-4 mb-3 bg-gray-50"><h3 class="font-bold text-sm mb-2">Question ${qCount+1}</h3><textarea name="q_text_${qCount}" placeholder="Question text" required class="w-full px-3 py-2 border rounded-lg mb-2" rows="2"></textarea><div class="grid grid-cols-2 gap-2"><input name="q_a_${qCount}" placeholder="Option A" required class="px-3 py-2 border rounded-lg text-sm"><input name="q_b_${qCount}" placeholder="Option B" required class="px-3 py-2 border rounded-lg text-sm"><input name="q_c_${qCount}" placeholder="Option C" required class="px-3 py-2 border rounded-lg text-sm"><input name="q_d_${qCount}" placeholder="Option D" required class="px-3 py-2 border rounded-lg text-sm"></div><select name="q_correct_${qCount}" class="mt-2 px-3 py-2 border rounded-lg text-sm"><option value="A">Correct: A</option><option value="B">Correct: B</option><option value="C">Correct: C</option><option value="D">Correct: D</option></select></div>`;d.insertAdjacentHTML('beforeend',h);qCount++;}</script>{% endblock %}
