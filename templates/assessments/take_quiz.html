{% extends 'base.html' %}{% block title %}{{ quiz.title }}{% endblock %}{% block content %}
<h1 class="text-2xl font-display font-bold text-brand-700 mb-2">{{ quiz.title }}</h1><p class="text-gray-500 mb-6">{{ quiz.lesson.topic_title }} &bull; {{ questions.count }} questions</p>
<form method="post" class="space-y-6">{% csrf_token %}{% for q in questions %}
<div class="bg-white rounded-xl shadow-sm p-5"><p class="font-bold text-brand-700 mb-3"><span class="text-brand-500">Q{{ forloop.counter }}.</span> {{ q.question_text }}</p>
<div class="grid sm:grid-cols-2 gap-2">
<label class="flex items-center gap-3 p-3 rounded-lg border border-gray-200 hover:bg-brand-50 cursor-pointer"><input type="radio" name="q_{{ q.id }}" value="A" class="accent-[#2B6B8A]" required><span>{{ q.option_a }}</span></label>
<label class="flex items-center gap-3 p-3 rounded-lg border border-gray-200 hover:bg-brand-50 cursor-pointer"><input type="radio" name="q_{{ q.id }}" value="B" class="accent-[#2B6B8A]"><span>{{ q.option_b }}</span></label>
<label class="flex items-center gap-3 p-3 rounded-lg border border-gray-200 hover:bg-brand-50 cursor-pointer"><input type="radio" name="q_{{ q.id }}" value="C" class="accent-[#2B6B8A]"><span>{{ q.option_c }}</span></label>
<label class="flex items-center gap-3 p-3 rounded-lg border border-gray-200 hover:bg-brand-50 cursor-pointer"><input type="radio" name="q_{{ q.id }}" value="D" class="accent-[#2B6B8A]"><span>{{ q.option_d }}</span></label>
</div></div>{% endfor %}
<button type="submit" class="bg-brand-500 text-white px-8 py-3 rounded-lg font-bold text-lg hover:bg-brand-600">Submit Answers</button></form>{% endblock %}
