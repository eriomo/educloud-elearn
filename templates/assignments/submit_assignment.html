{% extends 'base.html' %}{% block title %}Submit Assignment{% endblock %}{% block content %}
<h1 class="text-2xl font-display font-bold text-brand-700 mb-2">Submit: {{ assignment.title }}</h1><p class="text-gray-500 mb-6">Due: {{ assignment.deadline|date:"d M Y H:i" }}</p>
<div class="bg-white rounded-xl shadow-sm p-6 max-w-2xl"><form method="post" class="space-y-4">{% csrf_token %}
<div><label class="block text-sm font-semibold text-gray-700 mb-1">Your Response</label><textarea name="response_text" rows="10" required class="w-full px-3 py-2 border rounded-lg" placeholder="Type your answer here..."></textarea></div>
<button type="submit" class="bg-brand-500 text-white px-6 py-2 rounded-lg font-semibold hover:bg-brand-600">Submit</button></form></div>{% endblock %}
