{% extends 'base.html' %}{% block title %}Grade Submission{% endblock %}{% block content %}
<h1 class="text-2xl font-display font-bold text-brand-700 mb-2">Grade Submission</h1><p class="text-gray-500 mb-6">{{ submission.pupil.get_full_name }} &mdash; {{ submission.assignment.title }}</p>
<div class="bg-gray-50 rounded-xl p-5 mb-6"><h3 class="font-bold text-gray-700 mb-2">Pupil's Response:</h3><p class="text-gray-700">{{ submission.response_text|linebreaksbr }}</p></div>
<div class="bg-white rounded-xl shadow-sm p-6 max-w-lg"><form method="post" class="space-y-4">{% csrf_token %}
<div><label class="block text-sm font-semibold text-gray-700 mb-1">Grade (%)</label><input type="number" name="grade" min="0" max="100" step="0.5" value="{{ submission.grade|default:'' }}" required class="w-full px-3 py-2 border rounded-lg"></div>
<div><label class="block text-sm font-semibold text-gray-700 mb-1">Feedback</label><textarea name="feedback" rows="4" class="w-full px-3 py-2 border rounded-lg">{{ submission.feedback }}</textarea></div>
<button type="submit" class="bg-green-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-green-700">Save Grade</button></form></div>{% endblock %}
