{% extends 'base.html' %}{% block title %}Create Assignment{% endblock %}{% block content %}
<h1 class="text-2xl font-display font-bold text-brand-700 mb-6">Create Assignment</h1>
<div class="bg-white rounded-xl shadow-sm p-6 max-w-2xl"><form method="post" class="space-y-4">{% csrf_token %}
<div><label class="block text-sm font-semibold text-gray-700 mb-1">Title</label><input type="text" name="title" required class="w-full px-3 py-2 border rounded-lg"></div>
<div><label class="block text-sm font-semibold text-gray-700 mb-1">Class Level</label><select name="class_level" class="w-full px-3 py-2 border rounded-lg">{% for i in "123456" %}<option value="{{ i }}">Primary {{ i }}</option>{% endfor %}</select></div>
<div><label class="block text-sm font-semibold text-gray-700 mb-1">Description</label><textarea name="description" rows="6" required class="w-full px-3 py-2 border rounded-lg"></textarea></div>
<div><label class="block text-sm font-semibold text-gray-700 mb-1">Deadline</label><input type="datetime-local" name="deadline" required class="w-full px-3 py-2 border rounded-lg"></div>
<button type="submit" class="bg-brand-500 text-white px-6 py-2 rounded-lg font-semibold hover:bg-brand-600">Create Assignment</button></form></div>{% endblock %}
