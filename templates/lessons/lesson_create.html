{% extends 'base.html' %}{% block title %}Add Lesson{% endblock %}{% block content %}
<h1 class="text-2xl font-display font-bold text-brand-700 mb-6">Add New Lesson</h1>
<div class="bg-white rounded-xl shadow-sm p-6 max-w-2xl"><form method="post" enctype="multipart/form-data" class="space-y-4">{% csrf_token %}
<div><label class="block text-sm font-semibold text-gray-700 mb-1">Subject</label><select name="subject" class="w-full px-3 py-2 border rounded-lg">{% for s in subjects %}<option value="{{ s.id }}">{{ s }}</option>{% endfor %}</select></div>
<div><label class="block text-sm font-semibold text-gray-700 mb-1">Topic Title</label><input type="text" name="topic_title" required class="w-full px-3 py-2 border rounded-lg"></div>
<div><label class="block text-sm font-semibold text-gray-700 mb-1">Content</label><textarea name="content_text" rows="8" class="w-full px-3 py-2 border rounded-lg"></textarea></div>
<div><label class="block text-sm font-semibold text-gray-700 mb-1">Content Type</label><select name="content_type" class="w-full px-3 py-2 border rounded-lg"><option value="text">Text</option><option value="image">Image</option><option value="audio">Audio</option><option value="video">Video</option></select></div>
<div><label class="block text-sm font-semibold text-gray-700 mb-1">Attach File (optional)</label><input type="file" name="content_file" class="w-full"></div>
<button type="submit" class="bg-brand-500 text-white px-6 py-2 rounded-lg font-semibold hover:bg-brand-600">Save Lesson</button></form></div>{% endblock %}
